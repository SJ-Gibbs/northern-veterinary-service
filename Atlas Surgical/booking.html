    <main>
        <h1>Advice Request and Booking</h1>

            <form id="bookingform" action="index.php" method="POST" enctype="multipart/form-data">
                
                <div id="formbox">
                <div class="form-group">
                    <label for="practiceName">Practice Name:</label>
                    <input type="text" id="practiceName" placeholder="Northern Veterinary" required> 
                </div>
                
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" placeholder="practice@vets.com" required> 
                </div>

                <div class="form-group">
                    <label for="practiceNumber">Practice Number:</label>
                    <input type="tel" id="phone" placeholder="01234 567890"> 
                </div>

                <div class="form-group">
                    <label for="servicerequired">Service Required:</label>
                        <select id="servicerequired">
                            <option value="orthopaedics">Orthopaedic Surgery</option>
                            <option value="softtissue">Soft Tissue Surgery</option>
                            <option value="ultrasonography/Echocardiography">Ultrasonography/Echocardiography</option>
                            <option value="endoscopy">Endoscopy</option>
                        </select>
                </div>
            
                <div class="form-group">
                    <label for="History">Brief History:</label>
                    <textarea id="History" rows=5 cols=30 required></textarea>
                </div>

                <div class="form-group">
                    <label for="file">X-rays/Images:</label>
                    <input type="file" id="file" accept="image/png, image/jpeg, .dcm,application/dicom"><br>
                    <input type="submit" id="mySubmit">
                </div>
                </div>

            </form>
    

    </main>
