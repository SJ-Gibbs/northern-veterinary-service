<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Northern Veterinary Service</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="favicon.ico">
    <link rel="stylesheet" href="style.css">
</head>
<body class="gate-landing-page">
    <script>
        sessionStorage.removeItem('nvs_from_gate');
        if (sessionStorage.getItem('nvs_site_access') === '1') {
            window.location.replace('home.html');
        }
    </script>
    <header class="site-header gate-header">
        <div class="header-container">
            <div class="logo-section">
                <h1 class="site-title">Northern Veterinary Service</h1>
                <p class="tagline">Veterinary Peripatetic Services</p>
            </div>
        </div>
    </header>

    <main>
        <section class="hero gate-hero">
            <div class="hero-image-strip" aria-label="Surgeon banner images">
                <img src="images/Surgeon/Surgeon4.png" alt="">
                <img src="images/Surgeon/Surgeon6.jpeg" alt="">
            </div>
            <!-- Invisible hotspot on the left surgeon’s nose — only path to enter.html -->
            <a href="enter.html" class="hero-nose-link" id="noseGateLink" aria-label="Continue to site access" title=""></a>
            <div class="hero-content">
                <h2>Bringing Veterinary Services to Your Practice</h2>
                <p class="gate-hint">This site is for authorised visitors only.</p>
            </div>
        </section>
    </main>

    <footer class="site-footer gate-footer">
        <div class="footer-bottom">
            <p>&copy; 2026 Verlexis Ltd. All rights reserved.</p>
        </div>
    </footer>
    <script>
        document.getElementById('noseGateLink').addEventListener('click', function () {
            sessionStorage.setItem('nvs_from_gate', '1');
        });
    </script>
</body>
</html>
