<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Northern Veterinary Service</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="favicon.ico">
    <link rel="stylesheet" href="style.css">
</head>
<body class="gate-landing-page">
    <script>
        if (sessionStorage.getItem('northern_vet_site_access') === '1') {
            window.location.replace('home.html');
        }
    </script>
    <header class="site-header gate-header">
        <div class="header-container">
            <div class="logo-section">
                <h1 class="site-title">Northern Veterinary Service</h1>
                <p class="tagline">Veterinary Peripatetic Services</p>
            </div>
            <div class="auth-section">
                <div class="auth-buttons" id="authButtons">
                    <a href="login.html" class="btn-auth btn-login">Login</a>
                    <a href="signup.html" class="btn-auth btn-signup">Sign Up</a>
                </div>
                <div class="user-menu" id="userMenu" style="display: none;">
                    <button type="button" class="user-dropdown-btn" id="userDropdownBtn" aria-expanded="false" aria-haspopup="true">
                        <span class="user-icon" aria-hidden="true">👤</span>
                        <span class="user-name" id="userName"></span>
                        <span class="dropdown-arrow" aria-hidden="true">▼</span>
                    </button>
                    <div class="dropdown-menu" id="dropdownMenu" role="menu">
                        <a href="account.html" class="dropdown-item" id="accountLink" role="menuitem">My Account</a>
                        <a href="#" class="dropdown-item" id="logoutBtn" role="menuitem">Logout</a>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main>
        <section class="hero gate-hero">
            <div class="hero-image-strip" aria-label="Surgical and diagnostic imaging" data-hero-banner-cycle>
                <div class="hero-img-panel hero-img-panel--surgeon-left">
                    <img class="hero-surgeon-img hero-banner-layer hero-banner-layer--a" src="images/Herophoto/Surgeon4.png" alt="">
                    <img class="hero-surgeon-img hero-banner-layer hero-banner-layer--b" src="images/Herophoto/ultrasound1.png" alt="" loading="lazy" decoding="async">
                </div>
                <div class="hero-img-panel hero-img-panel--surgeon-mid">
                    <img class="hero-surgeon-img hero-banner-layer hero-banner-layer--a" src="images/Herophoto/Surgeon6.jpeg" alt="">
                    <img class="hero-surgeon-img hero-banner-layer hero-banner-layer--b" src="images/Herophoto/ultrasound2.jpeg" alt="" loading="lazy" decoding="async">
                </div>
            </div>
            <div class="hero-scrim" aria-hidden="true"></div>
            <div class="hero-content">
                <h2>Bringing Veterinary Services to Your Practice</h2>
                <p class="gate-hint">This is a members only site</p>
            </div>
        </section>
    </main>

    <footer class="site-footer gate-footer">
        <div class="footer-bottom">
            <p>&copy; 2026 Verlexis Ltd. All rights reserved.</p>
        </div>
    </footer>
    <script src="auth.js"></script>
    <script src="index.js"></script>
    <script src="hero-banner.js"></script>
</body>
</html>
