<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Site access — Northern Veterinary Service</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="favicon.ico">
    <link rel="stylesheet" href="style.css">
</head>
<body class="gate-enter-page">
    <main class="gate-enter-main">
        <div class="gate-enter-card">
            <h1 class="gate-enter-title">Northern Veterinary Service</h1>
            <p class="gate-enter-lead">Enter the username and password you were given to continue.</p>
            <div id="gateMessage" class="gate-enter-msg" style="display:none;" role="alert"></div>
            <form id="siteGateForm" class="gate-enter-form" autocomplete="on">
                <div class="form-group">
                    <label for="gateUser">Username</label>
                    <input type="text" id="gateUser" name="username" required autocomplete="username" autocapitalize="none">
                </div>
                <div class="form-group">
                    <label for="gatePass">Password</label>
                    <input type="password" id="gatePass" name="password" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary btn-full">Enter site</button>
            </form>
            <p class="gate-enter-back"><a href="index.html">← Back</a></p>
        </div>
    </main>
    <script>
        document.getElementById('siteGateForm').addEventListener('submit', function (e) {
            e.preventDefault();
            var u = document.getElementById('gateUser').value.trim();
            var p = document.getElementById('gatePass').value;
            var msg = document.getElementById('gateMessage');
            if (u === 'vet' && p === 'vet') {
                sessionStorage.setItem('northern_vet_site_access', '1');
                window.location.href = 'home.html';
            } else {
                msg.textContent = 'Those details are not correct. Please try again.';
                msg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
